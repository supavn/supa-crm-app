<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rạng Đông CRM</title>
  <meta name="description" content="Ứng dụng CRM nội bộ Rạng Đông - Quản lý cơ hội, khách hàng, dự án." />
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      max-width: 420px;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    p {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #333;
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .btn:hover {
      background: #111;
    }

    .note {
      margin-top: 24px;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Rạng Đông CRM</h1>
    <p>
      Ứng dụng nội bộ để quản lý cơ hội, khách hàng và dự án.
    </p>
    <a class="btn"
       href="https://github.com/supavn/supa-crm-app/releases/download/latest/RangDongCRM.apk"
       target="_blank"
       rel="noopener noreferrer">
      Tải APK (Android)
    </a>
    <p class="note">Dành cho nhân viên nội bộ Rạng Đông</p>
  </div>
</body>
</html>
